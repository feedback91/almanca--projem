<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Verb Master - Ruslana</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .header { color: #2c3e50; font-size: 1.5rem; font-weight: bold; margin-bottom: 5px; }
        .scoreboard { background: #ecf0f1; padding: 10px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; color: #34495e; font-size: 0.9rem; }
        .verb-box { background: #3498db; color: white; padding: 20px; border-radius: 15px; font-size: 1.6rem; font-weight: bold; margin-bottom: 5px; }
        .meaning { color: #7f8c8d; font-style: italic; margin-bottom: 20px; display: block; font-size: 1.1rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { padding: 15px; border: 2px solid #3498db; background: white; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 1rem; color: #2c3e50; }
        button:active { transform: scale(0.98); }
        .correct { background: #27ae60 !important; color: white !important; border-color: #27ae60 !important; }
        .wrong { background: #e74c3c !important; color: white !important; border-color: #e74c3c !important; }
        #feedback { margin-top: 15px; font-weight: bold; font-size: 1.1rem; }
        #example-box { margin-top: 15px; padding: 15px; background: #f1f9f5; border-left: 5px solid #27ae60; border-radius: 5px; display: none; text-align: left; }
        .next-btn { margin-top: 15px; width: 100%; background: #2ecc71; color: white; border: none; display: none; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .result-screen { display: none; }
        .control-btns { display: flex; gap: 10px; margin-top: 20px; flex-direction: column; }
        .restart-btn { background: #34495e; color: white; border: none; }
        .retry-errors-btn { background: #e67e22; color: white; border: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">German Verb Quiz</div>
    <div class="scoreboard" id="score-display">Correct: 0 / Total: 0</div>
    
    <div id="game-area">
        <div class="verb-box" id="verb-display">Loading...</div>
        <span class="meaning" id="meaning-display">...</span>
        
        <div class="grid" id="options-grid"></div>
        <div id="feedback"></div>
        
        <div id="example-box">
            <div id="example-de" style="font-weight: bold;"></div>
            <div id="example-en" style="font-size: 0.9rem; color: #555; margin-top: 5px;"></div>
        </div>

        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question ➔</button>
    </div>

    <div id="result-screen" class="result-screen">
        <h2>Quiz Completed!</h2>
        <div id="final-score" style="font-size: 1.2rem; margin-bottom: 20px;"></div>
        <div class="control-btns">
            <button class="restart-btn" onclick="restartGame(false)">Restart All Questions</button>
            <button id="retry-errors-btn" class="retry-errors-btn" onclick="restartGame(true)">Retry Mistaken Only</button>
        </div>
    </div>
</div>
